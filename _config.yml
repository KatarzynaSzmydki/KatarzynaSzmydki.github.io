about_content: | # this will include new lines to allow paragraphs
  Data Analyst / BI Developer with 7+ years of experience turning messy, disconnected data into decisions that matter — currently building data assets and analytics solutions at GSK, with a track record spanning PwC, StepStone and Philip Morris International.
  Across FMCG, tech and pharma I've translated ambiguous business requirements into robust data platforms and reporting, always with an eye on the person who actually has to use the output.

  I'm most skilled in: 
  - Modelling, extracting and transforming data with <mark>SQL</mark>, <mark>Python</mark> and <mark>PySpark</mark>,
  - Building and operating data platforms on <mark>Azure Databricks</mark> and the wider <mark>Azure Data Platform</mark> (ADF, DevOps CI/CD),
  - Designing reporting and analytics in <mark>Power BI</mark> that stakeholders actually trust and use,
  - Bridging the gap between data owners, product managers and business stakeholders. 

  Lately I've been increasingly drawn to applied AI — using LLMs and agentic tools to prototype faster ("vibe coding"), automate parts of the analytics workflow, and explore where GenAI and BI genuinely meet.

  Next in my technology bucket list:
  - GenAI / LLM-powered analytics and agentic workflows (Azure AI Foundry)
  - MS Fabric
  - Snowflake




