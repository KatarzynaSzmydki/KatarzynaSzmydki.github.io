  - title: Latest projects
    layout: list
    content:
      - layout: left
        title: Cryptocurrency Market Analytics Pipeline
        description: |
          <mark>New! (In-Progress)</mark>

          End-to-end BI pipeline for cryptocurrency markets. Python extracts daily market data for a configurable coin universe from the CoinGecko API; dbt transforms it into staging and mart models on DuckDB, including a data-quality monitoring model. Price forecasting and direction-prediction ML models are trained on the resulting history, and results are exported to Parquet for a Power BI report covering price trends alongside forecasts and predictions.

          Key project features: Python ETL from CoinGecko API, dbt on DuckDB, ML price forecasting and direction prediction, Power BI report, PowerShell pipeline orchestration

        link: https://github.com/KatarzynaSzmydki/coin-report
        link_text: Go to Project GitHub repository

      - layout: left
        title: Warsaw Air Quality BI Pipeline
        description: |
          <mark>New!</mark>

          End-to-end BI pipeline for Warsaw air quality data. Python ingestion pulls station, sensor and measurement readings from the public GIOS API; dbt transforms the raw layer into staging and mart models on DuckDB, including an incremental history model that accumulates readings across ingestion runs (GIOS only ever exposes a rolling window). A Power BI dashboard on top tracks current air quality status and parameter trends against EU limits.

          Key project features: Python ingestion, dbt on DuckDB, incremental history model, Power BI dashboard, CI with lint/pytest/dbt build and test

        link: https://github.com/KatarzynaSzmydki/warsaw-air-quality-bi
        link_text: Go to Project GitHub repository

      - layout: left
        title: Loan Request Verification Tool
        description: |

          Project implements scoring model within Flask application. User inputs basic financial information regarding loan request in a Flask form. Request is scored using pretrained ML model on saving to database (Azure SQL database) and flag informing whether user will or will not be granted the loan is assigned to the record.
          Application enables updating loan data or deleting records altogether. Each edit action triggers loan request scoring recalculation. 
          
          Summary statistics for processed requests are presented within PBI report embedded in the application. 
          
          Key project features: Python Flask application, Azure SQL Database, ML model, PBI report
          
        Link to working solution: https://loanapplicationverification.azurewebsites.net/
        link: https://github.com/KatarzynaSzmydki/Loan_Request_Verification/tree/master
        link_text: Go to Project GitHub repository

      - layout: left
